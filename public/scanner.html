<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Aaravam - Scanner</title>
<link href="https://fonts.googleapis.com/css2?family=Yatra+One&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
  :root{--gold:#F5B70A;--gold-dark:#C9860A;--leaf:#0B6E4F;--leaf-dark:#064E38;--maroon:#8E1B1B;--cream:#FFF8E1;
        --ok:#0B6E4F;--warn:#C9860A;--bad:#8E1B1B;}
  *{box-sizing:border-box;}
  body{font-family:'Poppins',sans-serif;margin:0;background:#111;color:#fff;min-height:100vh;}
  header{background:linear-gradient(90deg,var(--leaf-dark),var(--leaf));padding:14px 16px;text-align:center;}
  header h1{font-family:'Yatra One',cursive;font-size:22px;margin:0;}
  header p{margin:2px 0 0;font-size:12px;opacity:.9;}
  .wrap{max-width:480px;margin:0 auto;padding:14px;}
  .card{background:#1c1c1c;border-radius:14px;padding:16px;margin-bottom:14px;}
  input[type=password]{width:100%;padding:10px 12px;border:1.5px solid #444;border-radius:8px;font-size:16px;background:#000;color:#fff;}
  button{cursor:pointer;border:none;border-radius:8px;font-family:inherit;font-weight:700;font-size:15px;padding:12px 18px;}
  .btn-primary{background:var(--leaf);color:#fff;width:100%;margin-top:12px;}
  .btn-secondary{background:#333;color:#fff;width:100%;margin-top:8px;}
  .hidden{display:none;}
  #reader{width:100%;border-radius:12px;overflow:hidden;}
  .status-card{border-radius:16px;padding:20px;text-align:center;}
  .status-card.ok{background:linear-gradient(180deg,#0B6E4F,#064E38);}
  .status-card.warn{background:linear-gradient(180deg,#C9860A,#8E5F06);}
  .status-card.bad{background:linear-gradient(180deg,#8E1B1B,#5e1010);}
  .status-icon{font-size:48px;}
  .status-title{font-size:20px;font-weight:800;margin:6px 0 2px;}
  .status-sub{font-size:14px;opacity:.9;}
  .guest-name{font-family:'Yatra One',cursive;font-size:26px;margin:10px 0 2px;}
  .guest-slot{display:inline-block;margin-top:8px;padding:8px 18px;border-radius:24px;background:rgba(0,0,0,.25);font-weight:700;}
  .window-warn{margin-top:10px;padding:8px 12px;border-radius:8px;background:rgba(0,0,0,.25);font-size:12px;}
  .err{color:#ff8080;font-size:13px;margin-top:8px;}
  #scanCount{font-size:12px;color:#888;text-align:center;}
  .btn-group{background:#4a3aa8;color:#fff;width:100%;margin-top:8px;}
  .btn-override{background:#0d6ea8;color:#fff;width:100%;margin-top:8px;}
  .fam-row{display:flex;align-items:center;gap:10px;padding:8px 4px;border-bottom:1px solid #2a2a2a;font-size:14px;}
  .fam-row input[type=checkbox]{width:20px;height:20px;flex:0 0 auto;}
  .fam-row .fam-name{flex:1;}
  .fam-row .fam-note{font-size:11px;color:#999;}
  .fam-row.disabled-row{opacity:.4;}
  .fam-row.done-row{opacity:.55;}
</style>
</head>
<body>
<header>
  <h1>Aaravam</h1>
  <p>Entry Scanner &middot; DSR White Waters &middot; 5th September 2026</p>
</header>

<div class="wrap">

  <div class="card" id="pinCard">
    <label style="font-size:13px;font-weight:600;">Scanner PIN</label>
    <input type="password" id="pinInput" placeholder="Enter scanner PIN" style="margin-top:6px;">
    <button class="btn-primary" onclick="login()">Unlock Scanner</button>
    <div class="err" id="pinErr"></div>
  </div>

  <div id="scanArea" class="hidden">
    <div class="card">
      <div id="reader"></div>
      <div id="scanCount">Point camera at guest's QR code</div>
    </div>

    <div class="card hidden" id="resultCard">
      <div id="statusBox" class="status-card">
        <div class="status-icon" id="stIcon">•</div>
        <div class="status-title" id="stTitle">—</div>
        <div class="status-sub" id="stSub"></div>
        <div class="guest-name" id="stName"></div>
        <div id="slotWrap"><span class="guest-slot" id="stSlot"></span></div>
        <div class="window-warn hidden" id="windowWarn"></div>
      </div>
      <button class="btn-primary hidden" id="admitBtn" onclick="admit()">✓ Admit Guest</button>
      <button class="btn-override hidden" id="overrideBtn" onclick="overrideAndAdmit()">↪ Move to current slot &amp; Admit</button>
      <button class="btn-group hidden" id="showFamilyBtn" onclick="showFamily()">👨‍👩‍👧‍👦 Show Full Family (Group Check-In)</button>
      <button class="btn-secondary" onclick="resumeScanning()">Scan Next</button>
    </div>

    <div class="card hidden" id="familyCard">
      <div style="font-weight:700;margin-bottom:6px;" id="famHeading">Family</div>
      <div id="famList"></div>
      <button class="btn-primary" id="admitSelectedBtn" onclick="admitSelected()">✓ Admit Selected</button>
      <button class="btn-secondary" onclick="closeFamily()">Close</button>
    </div>
  </div>
</div>

<script>
  var PIN = '';
  var scanner = null;
  var currentToken = null;
  var busy = false;
  var scannedCount = 0;
  var SLOTS = [];
  var lastResult = null;

  async function api(method, url, body){
    var opts = { method: method, headers: {} };
    if(body){ opts.headers['Content-Type'] = 'application/json'; opts.body = JSON.stringify(body); }
    var r = await fetch(url, opts);
    return r.json();
  }

  async function login(){
    PIN = document.getElementById('pinInput').value;
    try{
      var res = await api('POST', '/api/scan/peek', { token: '__pin_test__', pin: PIN });
      if(res.status === 'bad_pin'){
        document.getElementById('pinErr').innerText = 'Invalid scanner PIN';
        return;
      }
      document.getElementById('pinCard').classList.add('hidden');
      document.getElementById('scanArea').classList.remove('hidden');
      try{ SLOTS = await api('GET', '/api/slots'); }catch(e){ SLOTS = []; }
      startScanner();
    }catch(err){
      document.getElementById('pinErr').innerText = 'Error: ' + err.message;
    }
  }

  // Figures out which slot's time window is happening right now, so the gate can offer to
  // move a guest booked into a different slot into "whatever's actually running" instead of
  // turning them away or breaking the schedule.
  function slotWindow(slotTimeStr){
    var m = /(\d+):(\d+)\s*(AM|PM)/i.exec(slotTimeStr || '');
    if(!m) return null;
    var h = parseInt(m[1],10), min = parseInt(m[2],10);
    if(/pm/i.test(m[3]) && h !== 12) h += 12;
    if(/am/i.test(m[3]) && h === 12) h = 0;
    var start = new Date();
    start.setHours(h, min, 0, 0);
    return { start: new Date(start.getTime() - 15*60000), end: new Date(start.getTime() + 45*60000) };
  }

  function getRunningSlot(){
    var now = new Date();
    for(var i=0;i<SLOTS.length;i++){
      var w = slotWindow(SLOTS[i].time);
      if(w && now >= w.start && now <= w.end) return SLOTS[i];
    }
    return null;
  }

  function startScanner(){
    scanner = new Html5Qrcode('reader');
    scanner.start(
      { facingMode: 'environment' },
      { fps: 10, qrbox: 240 },
      onScanSuccess,
      function(){ /* ignore per-frame errors */ }
    ).catch(function(err){
      document.getElementById('reader').innerHTML = '<div style="padding:20px;text-align:center;">Camera error: ' + err + '</div>';
    });
  }

  function extractToken(text){
    try{
      var url = new URL(text);
      var t = url.searchParams.get('t');
      if(t) return t;
    }catch(e){}
    var m = text.match(/[?&]t=([^&]+)/);
    return m ? m[1] : text;
  }

  async function onScanSuccess(decodedText){
    if(busy) return;
    busy = true;
    scannedCount++;
    document.getElementById('scanCount').innerText = 'Scans this session: ' + scannedCount;
    currentToken = extractToken(decodedText);
    scanner.pause(true);
    try{
      var res = await api('POST', '/api/scan/peek', { token: currentToken, pin: PIN });
      showResult(res);
    }catch(err){
      alert('Error looking up coupon: ' + err.message);
      resumeScanning();
    }
  }

  function showResult(res){
    lastResult = res;
    document.getElementById('resultCard').classList.remove('hidden');
    var box = document.getElementById('statusBox');
    var admitBtn = document.getElementById('admitBtn');
    var overrideBtn = document.getElementById('overrideBtn');
    var showFamilyBtn = document.getElementById('showFamilyBtn');
    var warnEl = document.getElementById('windowWarn');
    warnEl.classList.add('hidden');
    admitBtn.classList.add('hidden');
    overrideBtn.classList.add('hidden');
    showFamilyBtn.classList.add('hidden');
    closeFamily();

    if(!res.found || res.status === 'not_found'){
      box.className = 'status-card bad';
      document.getElementById('stIcon').innerText = '✕';
      document.getElementById('stTitle').innerText = 'NOT RECOGNIZED';
      document.getElementById('stSub').innerText = 'This QR code does not match any coupon';
      document.getElementById('stName').innerText = '';
      document.getElementById('stSlot').innerText = '';
      return;
    }
    if(res.status === 'disabled'){
      box.className = 'status-card bad';
      document.getElementById('stIcon').innerText = '🚫';
      document.getElementById('stTitle').innerText = 'COUPON CANCELLED';
      document.getElementById('stSub').innerText = 'This coupon was disabled by the committee';
      document.getElementById('stName').innerText = res.name + (res.type ? ' (' + res.type + ')' : '');
      document.getElementById('stSlot').innerText = '';
      return;
    }

    // Any recognized, non-cancelled coupon: offer to see the rest of the family for group
    // check-in, so a family with many tickets doesn't need to be scanned one by one.
    showFamilyBtn.classList.remove('hidden');

    if(res.status === 'already_used'){
      box.className = 'status-card warn';
      document.getElementById('stIcon').innerText = '⚠';
      document.getElementById('stTitle').innerText = 'ALREADY CHECKED IN';
      document.getElementById('stSub').innerText = res.checkedInTime ? ('at ' + res.checkedInTime) : '';
      document.getElementById('stName').innerText = res.name + (res.type ? ' (' + res.type + ')' : '');
      document.getElementById('stSlot').innerText = 'Slot ' + res.slotNumber + ' — ' + res.slotTime;
      return;
    }
    if(res.status === 'no_slot'){
      box.className = 'status-card warn';
      document.getElementById('stIcon').innerText = '⚠';
      document.getElementById('stTitle').innerText = 'NO SLOT BOOKED';
      document.getElementById('stSub').innerText = 'Guest has not selected a slot yet';
      document.getElementById('stName').innerText = res.name + (res.type ? ' (' + res.type + ')' : '');
      document.getElementById('stSlot').innerText = '';
      var running0 = getRunningSlot();
      if(running0){
        overrideBtn.innerText = '↪ Book into Slot ' + running0.number + ' (' + running0.time + ') & Admit';
        overrideBtn.classList.remove('hidden');
      }
      return;
    }
    if(res.status === 'ready'){
      box.className = 'status-card ok';
      document.getElementById('stIcon').innerText = '✓';
      document.getElementById('stTitle').innerText = 'VALID COUPON';
      document.getElementById('stSub').innerText = 'Not yet checked in';
      document.getElementById('stName').innerText = res.name + (res.type ? ' (' + res.type + ')' : '');
      document.getElementById('stSlot').innerText = 'Slot ' + res.slotNumber + ' — ' + res.slotTime;
      var w = checkWindow(res.slotTime);
      if(w){
        warnEl.classList.remove('hidden');
        warnEl.innerText = w;
      }
      admitBtn.classList.remove('hidden');
      // If this guest is booked into a slot other than the one actually running right now
      // (e.g. a kid who wants to join friends in a different slot than their parent picked),
      // offer to move just this one coupon into the running slot instead.
      var running = getRunningSlot();
      if(running && String(running.number) !== String(res.slotNumber)){
        overrideBtn.innerText = '↪ Move to Slot ' + running.number + ' (' + running.time + ') & Admit';
        overrideBtn.classList.remove('hidden');
      }
    }
  }

  function checkWindow(slotTimeStr){
    var m = /(\d+):(\d+)\s*(AM|PM)/i.exec(slotTimeStr || '');
    if(!m) return null;
    var h = parseInt(m[1],10), min = parseInt(m[2],10);
    if(/pm/i.test(m[3]) && h !== 12) h += 12;
    if(/am/i.test(m[3]) && h === 12) h = 0;
    var slotStart = new Date();
    slotStart.setHours(h, min, 0, 0);
    var winStart = new Date(slotStart.getTime() - 15*60000);
    var winEnd = new Date(slotStart.getTime() + 45*60000);
    var now = new Date();
    if(now < winStart) return 'Early — assigned slot starts at ' + slotTimeStr;
    if(now > winEnd) return 'Outside assigned slot window (' + slotTimeStr + ') — please confirm before admitting';
    return null;
  }

  async function admit(){
    if(!currentToken) return;
    try{
      var res = await api('POST', '/api/scan/checkin', { token: currentToken, pin: PIN });
      if(res.success){
        var box = document.getElementById('statusBox');
        box.className = 'status-card ok';
        document.getElementById('stIcon').innerText = '✓';
        document.getElementById('stTitle').innerText = 'ENTRY ALLOWED';
        document.getElementById('stSub').innerText = 'Checked in just now';
        document.getElementById('admitBtn').classList.add('hidden');
        if(navigator.vibrate) navigator.vibrate(150);
      } else {
        showResult(res);
      }
    }catch(err){
      alert('Error checking in guest: ' + err.message);
    }
  }

  async function overrideAndAdmit(){
    if(!currentToken) return;
    var running = getRunningSlot();
    if(!running){ alert('Could not determine which slot is running right now.'); return; }
    if(!confirm('Move this person into Slot ' + running.number + ' (' + running.time + ') and admit them now?')) return;
    try{
      var res = await api('POST', '/api/scan/override-slot', { token: currentToken, slotNumber: running.number, pin: PIN });
      if(!res.success){ alert(res.message); return; }
      var admitRes = await api('POST', '/api/scan/checkin', { token: currentToken, pin: PIN });
      if(admitRes.success){
        var box = document.getElementById('statusBox');
        box.className = 'status-card ok';
        document.getElementById('stIcon').innerText = '✓';
        document.getElementById('stTitle').innerText = 'ENTRY ALLOWED';
        document.getElementById('stSub').innerText = 'Moved to Slot ' + running.number + ' and checked in';
        document.getElementById('admitBtn').classList.add('hidden');
        document.getElementById('overrideBtn').classList.add('hidden');
        if(navigator.vibrate) navigator.vibrate(150);
      } else {
        showResult(admitRes);
      }
    }catch(err){ alert('Error: ' + err.message); }
  }

  // ============== GROUP CHECK-IN (whole family at once) ==============
  async function showFamily(){
    if(!currentToken) return;
    try{
      var res = await api('POST', '/api/scan/family', { token: currentToken, pin: PIN });
      if(!res.found){ alert(res.message || 'Could not load family.'); return; }
      document.getElementById('famHeading').innerText = (res.flat ? res.flat + ' — ' : '') + (res.contact || res.regId);
      var html = '';
      res.members.forEach(function(m){
        var disabled = m.checkedIn;
        var note = m.checkedIn ? 'Already checked in' : (m.slotNumber ? 'Slot ' + m.slotNumber + ' (' + m.slotTime + ')' : 'No slot booked');
        html += '<div class="fam-row' + (m.checkedIn ? ' done-row' : '') + '">' +
          '<input type="checkbox" data-coupon="' + m.couponId + '" ' + (disabled ? 'disabled' : (m.slotNumber ? 'checked' : '')) + '>' +
          '<div class="fam-name">' + escapeHtmlS(m.name) + ' (' + (m.type==='Adult'?'A':'K') + ') — ' + m.couponId + '<br><span class="fam-note">' + note + '</span></div>' +
          '</div>';
      });
      document.getElementById('famList').innerHTML = html;
      document.getElementById('familyCard').classList.remove('hidden');
    }catch(err){ alert('Error: ' + err.message); }
  }

  function escapeHtmlS(s){
    return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  async function admitSelected(){
    var boxes = document.querySelectorAll('#famList input[type=checkbox]:checked:not(:disabled)');
    var couponIds = Array.prototype.map.call(boxes, function(b){ return b.getAttribute('data-coupon'); });
    if(!couponIds.length){ alert('No one selected to admit.'); return; }
    try{
      var res = await api('POST', '/api/scan/checkin-batch', { couponIds: couponIds, pin: PIN });
      if(!res.success){ alert('Error admitting family.'); return; }
      var admitted = res.results.filter(function(r){ return r.ok; }).length;
      var skipped = res.results.length - admitted;
      alert('Admitted ' + admitted + ' of ' + res.results.length + ' selected' + (skipped ? (' (' + skipped + ' skipped — already used, disabled, or no slot)') : '') + '.');
      if(navigator.vibrate) navigator.vibrate(150);
      closeFamily();
      resumeScanning();
    }catch(err){ alert('Error: ' + err.message); }
  }

  function closeFamily(){
    document.getElementById('familyCard').classList.add('hidden');
  }

  function resumeScanning(){
    document.getElementById('resultCard').classList.add('hidden');
    currentToken = null;
    busy = false;
    if(scanner) scanner.resume();
  }
</script>
</body>
</html>

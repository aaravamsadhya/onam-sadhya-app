<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Aaravam - Registration</title>
<link href="https://fonts.googleapis.com/css2?family=Yatra+One&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  :root{--gold:#F5B70A;--gold-dark:#C9860A;--leaf:#0B6E4F;--leaf-dark:#064E38;--maroon:#8E1B1B;--cream:#FFF8E1;}
  *{box-sizing:border-box;}
  body{font-family:'Poppins',sans-serif;margin:0;background:linear-gradient(180deg,#FFF8E1,#FCEFC7);color:#3a2a00;}
  header{background:linear-gradient(90deg,var(--leaf-dark),var(--leaf));color:#fff;padding:22px 16px;text-align:center;}
  header h1{font-family:'Yatra One',cursive;font-size:30px;margin:0 0 4px;}
  header p{margin:0;font-size:13px;opacity:.9;}
  .wrap{max-width:520px;margin:0 auto;padding:16px;}
  .card{background:#fff;border-radius:14px;padding:18px;margin-bottom:16px;box-shadow:0 2px 10px rgba(0,0,0,.08);border:1px solid #eee;}
  .card h2{margin:0 0 12px;font-size:17px;color:var(--leaf-dark);border-bottom:2px solid var(--gold);padding-bottom:6px;}
  label{display:block;font-size:13px;font-weight:600;margin:10px 0 4px;color:#555;}
  input[type=text],input[type=tel]{width:100%;padding:10px 12px;border:1.5px solid #ddd;border-radius:8px;font-size:15px;font-family:inherit;}
  button{cursor:pointer;border:none;border-radius:8px;font-family:inherit;font-weight:600;font-size:14px;padding:11px 18px;}
  .btn-primary{background:var(--leaf);color:#fff;width:100%;margin-top:14px;}
  .btn-primary:disabled{background:#bbb;cursor:not-allowed;}
  .btn-secondary{background:#eee;color:#333;}
  .btn-add{background:#E6F4EA;color:var(--leaf-dark);font-size:13px;padding:8px 12px;margin-top:6px;}
  .btn-remove{background:none;color:var(--maroon);font-size:18px;padding:2px 8px;line-height:1;}
  .person-row{display:flex;gap:6px;align-items:center;margin-bottom:6px;}
  .person-row input{flex:1;}
  .msg{margin-top:10px;padding:10px 12px;border-radius:8px;font-size:13px;display:none;}
  .msg.err{background:#FDECEA;color:#8E1B1B;display:block;}
  .msg.ok{background:#E6F4EA;color:#0B6E4F;display:block;}
  .hidden{display:none;}
  .total-box{background:linear-gradient(90deg,var(--gold),#FFD75E);border-radius:12px;padding:16px;text-align:center;margin-top:8px;}
  .total-box .amt{font-size:28px;font-weight:800;color:var(--maroon);}
  .total-box .brk{font-size:12px;color:#5a3d00;margin-top:2px;}
  .upi-box{text-align:center;margin-top:14px;}
  #upiQr{display:inline-block;background:#fff;padding:8px;border-radius:10px;border:2px dashed var(--gold-dark);}
  .upi-id{font-weight:700;font-size:15px;margin-top:8px;color:var(--leaf-dark);word-break:break-all;}
  .checkline{display:flex;align-items:flex-start;gap:8px;margin-top:14px;font-size:13px;}
  .checkline input{margin-top:3px;}
  .link-btn{background:none;border:none;color:var(--leaf-dark);text-decoration:underline;font-size:13px;cursor:pointer;padding:0;}
  .status-pill{display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:700;}
  .status-pill.pending{background:#FFF3CD;color:#8a6d00;}
  .status-pill.confirmed{background:#E6F4EA;color:#0B6E4F;}
  .person-link{display:block;padding:6px 0;border-bottom:1px solid #f2f2f2;font-size:13px;color:var(--leaf-dark);text-decoration:none;}
  .center{text-align:center;color:#888;font-size:13px;}
</style>
</head>
<body>
<header>
  <h1>Aaravam</h1>
  <p>Onam Sadhya Registration &middot; DSR White Waters Clubhouse &middot; 5th September 2026</p>
</header>

<div class="wrap">

  <div class="card" id="formCard">
    <h2>Register Your Family</h2>

    <label>Flat Number</label>
    <input type="text" id="flat" placeholder="e.g. A-1203">

    <label>Your Name (Primary Contact)</label>
    <input type="text" id="contact" placeholder="e.g. Arjun Cheruvathari">

    <label>Your WhatsApp Number</label>
    <input type="tel" id="phone" placeholder="10-digit mobile number">

    <label style="margin-top:16px;">Adults (₹<span class="adultPriceTxt">450</span> each)</label>
    <div id="adultsList"></div>
    <button type="button" class="btn-add" onclick="addPerson('adults')">+ Add Adult</button>

    <label style="margin-top:16px;">Kids (₹<span class="kidPriceTxt">250</span> each)</label>
    <div id="kidsList"></div>
    <button type="button" class="btn-add" onclick="addPerson('kids')">+ Add Kid</button>

    <div class="total-box">
      <div class="amt">₹<span id="totalAmt">0</span></div>
      <div class="brk" id="totalBrk">0 adults, 0 kids</div>
    </div>
  </div>

  <div class="card" id="payCard">
    <h2>Make Payment</h2>
    <div class="upi-box">
      <div id="upiQr"></div>
      <div class="upi-id" id="upiIdTxt"></div>
      <div class="center">Scan with any UPI app (GPay, PhonePe, Paytm) or pay to the ID above</div>
    </div>
    <label>Transaction Reference / Last 4 digits (optional)</label>
    <input type="text" id="txnRef" placeholder="e.g. UPI Ref No.">
    <div class="checkline">
      <input type="checkbox" id="paidCheck">
      <label for="paidCheck" style="margin:0;">I have completed the payment for the amount shown above</label>
    </div>
    <button class="btn-primary" id="submitBtn" disabled onclick="submitForm()">Submit Registration</button>
    <div class="msg" id="formMsg"></div>
  </div>

  <div class="card">
    <button class="link-btn" onclick="toggleStatus()">Already registered? Check your status</button>
    <div id="statusArea" class="hidden" style="margin-top:12px;">
      <label>Your WhatsApp Number</label>
      <input type="tel" id="statusPhone" placeholder="10-digit mobile number">
      <button class="btn-secondary" style="width:100%;margin-top:8px;" onclick="checkStatus()">Check Status</button>
      <div id="statusResult" style="margin-top:10px;"></div>
    </div>
  </div>

</div>

<script>
  var adults = [''];
  var kids = [];
  var cfg = { adultPrice: 450, kidPrice: 250, upiId: '', upiName: 'Aaravam Sadhya Committee' };

  async function api(method, url, body){
    var opts = { method: method, headers: {} };
    if(body){ opts.headers['Content-Type'] = 'application/json'; opts.body = JSON.stringify(body); }
    var r = await fetch(url, opts);
    return r.json();
  }

  async function init(){
    try{
      cfg = await api('GET', '/api/config');
    }catch(e){}
    document.querySelectorAll('.adultPriceTxt').forEach(function(el){ el.innerText = cfg.adultPrice; });
    document.querySelectorAll('.kidPriceTxt').forEach(function(el){ el.innerText = cfg.kidPrice; });
    document.getElementById('upiIdTxt').innerText = cfg.upiId || '(UPI ID not configured yet)';
    renderPeople();
    updateTotal();
  }

  function addPerson(kind){
    (kind === 'adults' ? adults : kids).push('');
    renderPeople();
  }
  function removePerson(kind, idx){
    (kind === 'adults' ? adults : kids).splice(idx, 1);
    renderPeople();
  }
  function updateName(kind, idx, val){
    (kind === 'adults' ? adults : kids)[idx] = val;
    updateTotal();
  }

  function renderPeople(){
    renderList('adults', adults);
    renderList('kids', kids);
  }
  function renderList(kind, arr){
    var el = document.getElementById(kind + 'List');
    var html = '';
    arr.forEach(function(name, i){
      html += '<div class="person-row">' +
        '<input type="text" placeholder="Full name" value="' + escapeHtml(name) + '" oninput="updateName(\'' + kind + '\',' + i + ',this.value)">' +
        '<button type="button" class="btn-remove" onclick="removePerson(\'' + kind + '\',' + i + ')">&times;</button></div>';
    });
    el.innerHTML = html;
  }

  function escapeHtml(s){
    return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function updateTotal(){
    var a = adults.filter(function(n){ return n.trim(); }).length;
    var k = kids.filter(function(n){ return n.trim(); }).length;
    var total = a * cfg.adultPrice + k * cfg.kidPrice;
    document.getElementById('totalAmt').innerText = total;
    document.getElementById('totalBrk').innerText = a + ' adult' + (a!==1?'s':'') + ', ' + k + ' kid' + (k!==1?'s':'');
    document.getElementById('submitBtn').disabled = !(total > 0 && document.getElementById('paidCheck').checked);
    renderUpiQr(total);
  }

  function renderUpiQr(total){
    var holder = document.getElementById('upiQr');
    holder.innerHTML = '';
    if (!cfg.upiId || total <= 0) { holder.innerHTML = '<div style="padding:20px;color:#888;font-size:12px;">Add family members to generate payment QR</div>'; return; }
    var upiUri = 'upi://pay?pa=' + encodeURIComponent(cfg.upiId) + '&pn=' + encodeURIComponent(cfg.upiName) +
      '&am=' + total + '&cu=INR&tn=' + encodeURIComponent('Aaravam Sadhya 2026');
    new QRCode(holder, { text: upiUri, width: 150, height: 150, colorDark: '#064E38', colorLight: '#ffffff' });
  }

  document.getElementById('paidCheck').addEventListener('change', updateTotal);

  async function submitForm(){
    var payload = {
      flat: document.getElementById('flat').value,
      contact: document.getElementById('contact').value,
      phone: document.getElementById('phone').value,
      adults: adults.filter(function(n){ return n.trim(); }),
      kids: kids.filter(function(n){ return n.trim(); }),
      txnRef: document.getElementById('txnRef').value
    };
    document.getElementById('submitBtn').disabled = true;
    try{
      var res = await api('POST', '/api/register', payload);
      if(!res.success){
        showMsg(res.message, 'err');
        document.getElementById('submitBtn').disabled = false;
        return;
      }
      document.getElementById('formCard').innerHTML = '<h2>Registered!</h2>' +
        '<p>Thanks, ' + escapeHtml(payload.contact) + '! Your registration <b>' + res.regId + '</b> for ₹' + res.total + ' has been received.</p>' +
        '<p>The Sadhya committee will verify your payment and send your individual coupons to this WhatsApp number shortly.</p>';
      document.getElementById('payCard').classList.add('hidden');
    }catch(err){
      showMsg('Something went wrong: ' + err.message, 'err');
      document.getElementById('submitBtn').disabled = false;
    }
  }

  function showMsg(text, cls){
    var el = document.getElementById('formMsg');
    el.className = 'msg ' + cls;
    el.innerText = text;
  }

  function toggleStatus(){
    document.getElementById('statusArea').classList.toggle('hidden');
  }

  async function checkStatus(){
    var phone = document.getElementById('statusPhone').value;
    var res = await api('POST', '/api/lookup', { phone: phone });
    var el = document.getElementById('statusResult');
    if(!res.found){
      el.innerHTML = '<div class="center">No registration found for this number.</div>';
      return;
    }
    var pillClass = res.status === 'Confirmed' ? 'confirmed' : 'pending';
    var html = '<div><b>' + res.regId + '</b> &middot; <span class="status-pill ' + pillClass + '">' + res.status + '</span></div>' +
      '<div style="margin-top:6px;font-size:13px;">₹' + res.total + ' &middot; ' + res.adultCount + ' adult(s), ' + res.kidCount + ' kid(s)</div>';
    if(res.status === 'Confirmed' && res.coupons){
      html += '<div style="margin-top:10px;font-weight:700;font-size:13px;">Your coupons:</div>';
      res.coupons.forEach(function(c){
        html += '<a class="person-link" href="' + c.url + '">' + c.name + ' (' + c.type + ')' +
          (c.slotNumber ? ' — Slot ' + c.slotNumber + ' (' + c.slotTime + ')' : ' — pick your slot') + '</a>';
      });
    } else if(res.status === 'Pending') {
      html += '<div style="margin-top:8px;font-size:12px;color:#888;">Waiting for the committee to verify your payment.</div>';
    }
    el.innerHTML = html;
  }

  init();
</script>
</body>
</html>
